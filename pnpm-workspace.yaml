# Only the frontend uses pnpm workspaces.
# The 'packages/' directory contains Rust crates (Cargo.toml), not npm packages.
# The backend is also a Rust crate.
packages:
  - 'apps/ai-engineering-hub/src/frontend'
allowBuilds:
  '@parcel/watcher': set this to true or false
  esbuild: set this to true or false
onlyBuiltDependencies:
  - '@parcel/watcher'
  - 'esbuild'
