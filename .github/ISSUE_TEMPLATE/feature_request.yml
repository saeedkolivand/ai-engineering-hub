name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does the current behavior fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New integration / source
        - Analytics / metrics
        - Desktop UI
        - Stream Deck plugin
        - Developer experience
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: invariants
    attributes:
      label: Fits the architecture
      options:
        - label: This keeps tools as data (no hardcoded tool enum) and the single-process model intact.
