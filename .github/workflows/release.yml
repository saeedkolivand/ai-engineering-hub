name: Release

# Tag a version to cut a release: `node scripts/set-version.mjs 0.2.0` → commit →
# `git tag v0.2.0 && git push origin v0.2.0`.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  # Build signed installers for every platform and publish them to a GitHub Release.
  # Because the updater is configured + signed, this also uploads `latest.json`, which the
  # app's updater endpoint points at — enabling auto-update.
  app:
    name: Build & release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            args: ""
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for signed auto-update artifacts (latest.json + .sig).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/ai-engineering-hub
          tagName: ${{ github.ref_name }}
          releaseName: "AI Engineering Hub ${{ github.ref_name }}"
          releaseBody: |
            Download an installer for your platform below. Existing installs auto-update.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Package the Stream Deck plugin and attach it to the same release.
  plugin:
    name: Package Stream Deck plugin
    needs: app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ai-engineering-monitor-plugin run sd:pack
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: apps/streamdeck-plugin/*.streamDeckPlugin
