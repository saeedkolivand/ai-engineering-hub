name: Release

# Runs on every push to main. semantic-release determines whether the commits
# since the last tag warrant a new release. If yes, the build/plugin/publish
# jobs run in the same workflow run (no second push/tag event needed).
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── 1. Determine next version ──────────────────────────────────────────────
  version:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.sr.outputs.released }}
      version: ${{ steps.sr.outputs.version }}
      tag: ${{ steps.sr.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          BEFORE=$(git tag -l | sort)
          pnpm exec semantic-release
          AFTER=$(git tag -l | sort)
          NEW_TAG=$(comm -13 <(echo "$BEFORE") <(echo "$AFTER") | tail -1)
          if [ -n "$NEW_TAG" ]; then
            echo "released=true"          >> "$GITHUB_OUTPUT"
            echo "tag=$NEW_TAG"           >> "$GITHUB_OUTPUT"
            echo "version=${NEW_TAG#v}"   >> "$GITHUB_OUTPUT"
          else
            echo "released=false"         >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Build signed Tauri installers on every platform ────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: version
    if: needs.version.outputs.released == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm app:build
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: target/release/bundle
          if-no-files-found: warn

  # ── 3. Package Stream Deck plugin ──────────────────────────────────────────
  plugin:
    name: Stream Deck plugin
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ai-engineering-monitor-plugin build
      - run: pnpm --filter ai-engineering-monitor-plugin run sd:pack
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: apps/streamdeck-plugin/*.streamDeckPlugin
          if-no-files-found: error

  # ── 4. Assemble latest.json and publish the GitHub release ─────────────────
  publish:
    name: Publish release
    needs: [version, build, plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble updater manifest
        run: |
          node scripts/make-update-manifest.mjs \
            "${{ needs.version.outputs.tag }}" \
            artifacts \
            "${{ github.repository }}"
      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "AI Engineering Hub $TAG" \
            --generate-notes

          # Installers + signed updater bundles
          find artifacts -type f \( \
            -name "*.AppImage"            -o \
            -name "*.AppImage.sig"        -o \
            -name "*.AppImage.tar.gz"     -o \
            -name "*.AppImage.tar.gz.sig" -o \
            -name "*.msi"                 -o \
            -name "*.msi.sig"             -o \
            -name "*.msi.zip"             -o \
            -name "*.msi.zip.sig"         -o \
            -name "*-setup.exe"           -o \
            -name "*-setup.exe.sig"       -o \
            -name "*.nsis.zip"            -o \
            -name "*.nsis.zip.sig"        -o \
            -name "*.deb"                 -o \
            -name "*.rpm"                 -o \
            -name "*.dmg"                 -o \
            -name "*.app.tar.gz"          -o \
            -name "*.app.tar.gz.sig"      -o \
            -name "*.streamDeckPlugin"    \
          \) -exec gh release upload "$TAG" {} \
               --repo "${{ github.repository }}" --clobber \;

          # Updater manifest (fetched by the app's auto-updater)
          gh release upload "$TAG" latest.json \
            --repo "${{ github.repository }}" --clobber

  # ── 5. Update Homebrew cask in-repo ────────────────────────────────────────
  update-cask:
    name: Update Homebrew cask
    needs: [version, publish]
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute SHA256 and update cask
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          DMG=$(find artifacts -name "*aarch64.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No arm64 DMG found in artifacts — skipping cask update"
            exit 0
          fi
          SHA256=$(sha256sum "$DMG" | awk '{print $1}')
          echo "DMG: $DMG"
          echo "SHA256: $SHA256"
          node scripts/update-homebrew-cask.mjs "$VERSION" "$SHA256"
      - name: Commit and push cask update
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add Casks/ai-engineering-hub.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date — nothing to commit"
          else
            git commit -m "chore(brew): update cask to v${{ needs.version.outputs.version }} [skip ci]"
            git push origin main
          fi
